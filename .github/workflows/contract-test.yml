name: contract-test

# Runs whenever the API DTO contract might drift — either side.
#
# Stage 1: the backend generates JSON Schemas from its Pydantic models and
#          uploads them as artifacts.
# Stage 2: the frontend downloads the schemas and verifies its Freezed DTOs
#          can parse sample payloads matching them. This catches drift early,
#          not at runtime.

on:
  push:
    branches: [main]
    paths:
      - "backend/nyayalens/models/**"
      - "frontend/lib/shared/models/**"
      - "shared/schemas/**"
      - ".github/workflows/contract-test.yml"
  pull_request:
    paths:
      - "backend/nyayalens/models/**"
      - "frontend/lib/shared/models/**"
      - "shared/schemas/**"
      - ".github/workflows/contract-test.yml"

concurrency:
  group: contract-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate-schemas:
    name: Export API JSON schemas from backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Export JSON schemas
        # `scripts/export_schemas.py` walks every Pydantic DTO re-exported
        # by `nyayalens.models.api` and writes them to shared/schemas/.
        run: |
          mkdir -p ../shared/schemas
          python scripts/export_schemas.py --out ../shared/schemas
          ls -la ../shared/schemas

      - name: Upload schema artifacts
        uses: actions/upload-artifact@v4
        with:
          name: api-schemas
          path: shared/schemas/

  verify-frontend-can-parse:
    name: Frontend parses golden fixtures
    needs: generate-schemas
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Download schemas
        uses: actions/download-artifact@v4
        with:
          name: api-schemas
          path: ../shared/schemas

      - name: Install dependencies
        run: flutter pub get

      - name: Run contract parser tests
        # `test/contract/` loads each JSON Schema artifact and asserts the
        # well-known DTOs still expose the field names the Flutter client
        # parses. Drift fails CI immediately rather than at runtime.
        run: flutter test test/contract/ --no-pub
