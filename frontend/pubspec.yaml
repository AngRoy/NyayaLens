name: nyayalens_client
description: "NyayaLens Flutter web client — AI accountability for hiring fairness."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.5.0
  # `Color.withValues(alpha:)` (used in features/demo and shared/widgets)
  # landed in Flutter 3.27. Pin the minimum so contributors on older
  # SDKs see a `pub get` resolver error rather than a missing-method one.
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0

  # Routing
  go_router: ^17.2.2

  # HTTP client (Firebase-Auth token interceptor lives in shared/api_client/)
  dio: ^5.7.0
  web: ^1.1.1

  # Models & serialisation
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  collection: ^1.18.0

  # Charts (bias heatmap uses CustomPainter; metric cards use fl_chart)
  fl_chart: ^1.2.0

  # PDF viewer for report preview screen
  pdfx: ^2.8.0
  file_picker: ^11.0.2

  # Firebase (lazy-loaded; backend does the heavy lifting)
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0

  # Google Sign-In (auth entry on S01)
  google_sign_in: ^7.2.0

  # Theming & icons
  google_fonts: ^8.0.2
  material_design_icons_flutter: ^7.0.7296

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Lint + analyzer
  flutter_lints: ^6.0.0

  # Codegen (freezed + riverpod + json_serializable)
  build_runner: ^2.4.13
  freezed: ^3.2.3
  json_serializable: ^6.9.0
  riverpod_generator: ^4.0.0+1
  custom_lint: ^0.8.1
  riverpod_lint: ^3.1.0

flutter:
  uses-material-design: true
  # Add assets and fonts as they land in week 2.
  # assets:
  #   - assets/images/
