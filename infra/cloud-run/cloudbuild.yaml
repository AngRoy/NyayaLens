# NyayaLens API — Cloud Build pipeline.
#
# Trigger:
#   gcloud builds submit --config infra/cloud-run/cloudbuild.yaml ./backend
#
# Or wire to a GitHub trigger that fires on push to `main`.

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --tag=gcr.io/$PROJECT_ID/nyayalens-api:$SHORT_SHA
      - --tag=gcr.io/$PROJECT_ID/nyayalens-api:latest
      - .

  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - gcr.io/$PROJECT_ID/nyayalens-api

  # Substitute ${IMAGE} in the SHA-pinned service manifest and apply it.
  # Keeps the manifest the single source of truth (resources, scaling,
  # env vars, secrets) instead of letting `gcloud run deploy` flags drift.
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        apt-get update && apt-get install -y --no-install-recommends gettext-base
        export IMAGE="gcr.io/$PROJECT_ID/nyayalens-api:$SHORT_SHA"
        envsubst < infra/cloud-run/service.yaml > /workspace/service-rendered.yaml
        gcloud run services replace /workspace/service-rendered.yaml \
          --region=asia-south1 \
          --platform=managed

images:
  - gcr.io/$PROJECT_ID/nyayalens-api:$SHORT_SHA
  - gcr.io/$PROJECT_ID/nyayalens-api:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
