# NyayaLens API — Cloud Build pipeline.
#
# Trigger:
#   gcloud builds submit --config infra/cloud-run/cloudbuild.yaml ./backend
#
# Or wire to a GitHub trigger that fires on push to `main`.

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --tag=gcr.io/$PROJECT_ID/nyayalens-api:$SHORT_SHA
      - --tag=gcr.io/$PROJECT_ID/nyayalens-api:latest
      - .

  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - gcr.io/$PROJECT_ID/nyayalens-api

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - nyayalens-api
      - --image=gcr.io/$PROJECT_ID/nyayalens-api:$SHORT_SHA
      - --region=asia-south1
      - --platform=managed
      - --allow-unauthenticated

images:
  - gcr.io/$PROJECT_ID/nyayalens-api:$SHORT_SHA
  - gcr.io/$PROJECT_ID/nyayalens-api:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
