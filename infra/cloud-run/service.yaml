# NyayaLens API — Cloud Run service manifest.
#
# Deploy (image must be SHA-pinned — never apply this raw):
#   IMAGE=gcr.io/nyayalens/nyayalens-api:$(git rev-parse --short HEAD) \
#     envsubst < infra/cloud-run/service.yaml | \
#     gcloud run services replace - \
#       --region=asia-south1 \
#       --project=nyayalens
#
# The Cloud Build pipeline (infra/cloud-run/cloudbuild.yaml) substitutes
# IMAGE itself on push-to-main; this file documents the manual flow used
# for ad-hoc rollbacks.

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: nyayalens-api
  labels:
    app: nyayalens
    component: api
  annotations:
    run.googleapis.com/launch-stage: BETA
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/cpu-throttling: "true"
        run.googleapis.com/execution-environment: gen2
    spec:
      timeoutSeconds: 120
      containerConcurrency: 8
      serviceAccountName: nyayalens-api@nyayalens.iam.gserviceaccount.com
      containers:
        - name: api
          image: ${IMAGE}
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "2"
              memory: 2Gi
          env:
            - name: NYAYALENS_ENV
              value: prod
            - name: NYAYALENS_LOG_LEVEL
              value: INFO
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "8080"
            - name: GOOGLE_CLOUD_PROJECT
              value: nyayalens
            - name: FIREBASE_STORAGE_BUCKET
              value: nyayalens.appspot.com
            - name: GEMINI_MODEL_EXPLAIN
              value: gemini-flash-latest
            - name: GEMINI_MODEL_SCHEMA
              value: gemini-pro-latest
            - name: GEMINI_TEMPERATURE
              value: "0.2"
            - name: ENABLE_RESPONSE_CACHE
              value: "true"
            - name: ENABLE_GROUNDING_VALIDATOR
              value: "true"
            - name: CORS_ALLOWED_ORIGINS
              value: "https://nyayalens.web.app,https://nyayalens.firebaseapp.com"
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: gemini-api-key
                  key: latest
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 5
  traffic:
    - latestRevision: true
      percent: 100
